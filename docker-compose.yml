services:
  web:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - garth_cache:/root/.garth
    command: sh -c "apk add --no-cache python3 py3-pip && npm ci && pip3 install --break-system-packages --no-cache-dir -r fetch/requirements.txt && npm run dev -- --host 0.0.0.0 --port 5173"

  sync:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r fetch/requirements.txt && python fetch/sync.py"
    profiles:
      - sync

volumes:
  node_modules:
  garth_cache:
